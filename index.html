<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Introducción a la IA con aplicación a la investigación clínica y epidemiológica — Taller FUCS / Laboratorio ProfundaMente">
  <title>IA en Investigación en Salud — FUCS</title>
  <!-- OpenGraph -->
  <meta property="og:title"       content="Introducción a la IA en Investigación en Salud — FUCS">
  <meta property="og:description" content="Taller práctico en 6 sesiones guiadas sobre IA generativa aplicada a investigación clínica y epidemiológica. Laboratorio ProfundaMente · Programa GLORIA · FUCS.">
  <meta property="og:type"        content="website">
  <meta property="og:image"       content="assets/cartelera.png">
  <!-- Favicon emoji (no requiere archivo) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ── Modal cartelera ── -->
<div id="modal-cartelera" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(10,18,45,.72);align-items:center;justify-content:center;padding:20px" role="dialog" aria-modal="true" aria-label="Cartelera del curso">
  <div id="modal-box">
    <button id="modal-close" aria-label="Cerrar">&times;</button>
    <img src="assets/cartelera.png" alt="Cartelera del curso Introducción a la IA en Investigación en Salud">
  </div>
</div>

<!-- ── Overlay móvil ── -->
<div id="sidebar-overlay" aria-hidden="true"></div>

<div id="app">

  <!-- ══════════ SIDEBAR ══════════ -->
  <aside id="sidebar" aria-label="Menú principal del taller">
    <div class="sidebar-header">
      <div class="logo-group">
        <img src="assets/logo-fucs-dark.png" alt="Universidad FUCS" width="140">
        <hr class="logo-divider">
        <a href="https://jjsprockel.github.io/profundamente-web/" target="_blank" rel="noopener" title="Visitar sitio de ProfundaMente"><img src="assets/logo-profundamente-dark.png" alt="Laboratorio ProfundaMente" width="140"></a>
      </div>
    </div>
    <div class="sidebar-title">Taller IA · Investigación en Salud</div>
    <ul id="nav-menu" role="navigation" aria-label="Sesiones del taller"></ul>
  </aside>

  <!-- ══════════ CONTENIDO PRINCIPAL ══════════ -->
  <div id="content">

    <!-- Topbar móvil -->
    <div id="topbar" role="banner">
      <button id="hamburger" aria-label="Abrir menú" aria-expanded="false" aria-controls="sidebar">
        <span></span><span></span><span></span>
      </button>
      <span class="topbar-title">IA en Investigación en Salud</span>
    </div>

    <!-- Navegación de pestañas -->
    <div id="tab-nav-wrapper" role="navigation" aria-label="Bloques de la sesión"></div>

    <!-- Paneles de contenido -->
    <main id="tab-panels" role="main"></main>

    <!-- Pie de página -->
    <footer>
      <strong>John Jaime Sprockel, MD ESP, MSc, MBA</strong> — Director Laboratorio ProfundaMente
    </footer>

  </div><!-- /content -->
</div><!-- /app -->

<!-- ══════════ Scripts ══════════ -->
<script src="js/data.js"></script>
<script src="js/copy.js"></script>
<script src="js/progress.js"></script>
<script src="js/render.js"></script>
<!-- Prism.js — resaltado de sintaxis (mejora progresiva) -->
<script data-manual src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
  (function () {
    var modal = document.getElementById('modal-cartelera');
    var closeBtn = document.getElementById('modal-close');
    function cerrar() {
      modal.style.display = 'none';
      document.body.style.overflow = '';
    }
    function abrir() {
      modal.style.display = 'flex';
      modal.style.animation = 'modal-in .3s ease';
      document.body.style.overflow = 'hidden';
    }
    closeBtn.addEventListener('click', cerrar);
    modal.addEventListener('click', function (e) { if (e.target === modal) cerrar(); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') cerrar(); });
    window.addEventListener('load', abrir);
  })();
</script>

</body>
</html>
